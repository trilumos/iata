<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESC}}">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta name="bingbot" content="index, follow">
  <meta name="google-site-verification" content="717b108d8b12989c">
  <meta property="og:site_name" content="IATA Codes">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="author" content="IATA Codes">
  <link rel="canonical" href="https://iatacode.pages.dev/{{PAGE_SLUG}}/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "{{PAGE_TITLE}}",
    "applicationCategory": "Travel",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0" },
    "url": "https://iatacode.pages.dev/{{PAGE_SLUG}}/"
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0e1a; --navy2: #111827; --blue: #2563eb; --blue-light: #3b82f6;
      --cyan: #06b6d4; --border: #1e2d47; --card: #0f1829; --text: #e2e8f0; --text-dim: #94a3b8;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    a { color: var(--blue-light); text-decoration: none; }
    a:hover { color: var(--cyan); }
    .site-header { background: var(--navy2); border-bottom: 1px solid var(--border); padding: 0 1.5rem; }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-family: var(--mono); font-weight: 700; font-size: 1rem; color: var(--text); }
    .logo span { color: var(--cyan); }
    .nav { display: flex; gap: 1.5rem; font-size: 0.82rem; }
    .nav a { color: var(--text-dim); transition: color 0.15s; }
    .nav a:hover { color: var(--cyan); }
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .hero { padding-bottom: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .hero-sub { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); margin-bottom: 0.6rem; }
    .hero h1 { font-size: clamp(1.4rem, 3vw, 1.9rem); font-weight: 700; color: #fff; }
    .hero-desc { color: var(--text-dim); margin-top: 0.5rem; font-size: 0.9rem; }
    .search-box { position: relative; max-width: 560px; margin: 2rem 0; }
    .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.1rem; font-size: 1rem; color: var(--text); font-family: var(--sans); outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--cyan); }
    .search-input::placeholder { color: var(--text-dim); }
    .search-results { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--navy2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .ad-slot { min-height: 90px; border: 1px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.75rem; font-family: var(--mono); margin: 1.5rem 0; }
    h2 { font-size: 0.9rem; font-family: var(--mono); font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .ref-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .ref-table thead tr { border-bottom: 1px solid var(--border); }
    .ref-table th { padding: 0.6rem 0.75rem; text-align: left; font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; }
    .ref-table tbody tr { border-bottom: 1px solid rgba(30,45,71,0.5); transition: background 0.1s; }
    .ref-table tbody tr:hover { background: var(--card); }
    .ref-table td { padding: 0.6rem 0.75rem; }
    .iata-col { font-family: var(--mono); font-weight: 700; color: var(--cyan); }
    .icao-col { font-family: var(--mono); color: var(--text-dim); }
    footer { border-top: 1px solid var(--border); padding: 1.5rem; text-align: center; font-size: 0.78rem; color: var(--text-dim); }
    @media (max-width: 640px) { .nav { display: none; } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">✈ IATA<span>Codes</span></a>
      <nav class="nav">
        <a href="/">Search</a>
        <a href="/iata-to-icao/">IATA→ICAO</a>
        <a href="/icao-to-iata/">ICAO→IATA</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="hero">
      <div class="hero-sub">Airport Code Converter</div>
      <h1>{{PAGE_TITLE}}</h1>
      <div class="hero-desc">{{PAGE_DESC}}</div>
    </div>

    <div class="search-box">
      <input id="search-input" type="text" class="search-input"
        placeholder="{{SEARCH_PLACEHOLDER}}"
        autocomplete="off" spellcheck="false" autofocus>
      <div id="search-results" class="search-results" hidden></div>
    </div>

    <div class="ad-slot"><!-- ADSENSE_TOP_BANNER --></div>

    <section>
      <h2>Reference Table (first 50)</h2>
      <table class="ref-table">
        <thead>
          <tr>
            <th>Airport</th>
            <th>IATA</th>
            <th>ICAO</th>
            <th>City</th>
          </tr>
        </thead>
        <tbody>
          {{TABLE_ROWS}}
        </tbody>
      </table>
    </section>

    <div class="ad-slot"><!-- ADSENSE_BOTTOM_BANNER --></div>
  </main>
  <footer>
    Data from <a href="https://openflights.org/data">OpenFlights</a> ·
    <a href="/">IATA Code Lookup</a>
  </footer>
  <script src="/widget.js"></script>
  <script>AirportSearch.init('search-input', 'search-results', '{{SEARCH_MODE}}');</script>
</body>
</html>
