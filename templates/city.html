<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airports in {{CITY}}, {{COUNTRY}} — IATA Codes</title>
  <meta name="description" content="Find all {{COUNT}} airports in {{CITY}}, {{COUNTRY}} with IATA and ICAO codes. Airport lookup and code reference.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://iatacode.pages.dev/city/{{CITY_SLUG}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0e1a; --navy2: #111827; --blue: #2563eb; --blue-light: #3b82f6;
      --cyan: #06b6d4; --border: #1e2d47; --card: #0f1829; --text: #e2e8f0; --text-dim: #94a3b8;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    a { color: var(--blue-light); text-decoration: none; }
    a:hover { color: var(--cyan); }
    .site-header { background: var(--navy2); border-bottom: 1px solid var(--border); padding: 0 1.5rem; }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-family: var(--mono); font-weight: 700; font-size: 1rem; color: var(--text); }
    .logo span { color: var(--cyan); }
    .nav { display: flex; gap: 1.5rem; font-size: 0.82rem; }
    .nav a { color: var(--text-dim); transition: color 0.15s; }
    .nav a:hover { color: var(--cyan); }
    .breadcrumb { max-width: 900px; margin: 0 auto; padding: 0.85rem 1.5rem; font-size: 0.78rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .breadcrumb a { color: var(--text-dim); }
    .bc-sep { opacity: 0.4; }
    main { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .hero { padding: 2rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .hero-sub { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); margin-bottom: 0.6rem; }
    .hero h1 { font-size: clamp(1.4rem, 3vw, 1.9rem); font-weight: 700; color: #fff; }
    .ad-slot { min-height: 90px; border: 1px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.75rem; font-family: var(--mono); margin: 1.5rem 0; }
    h2 { font-size: 0.9rem; font-family: var(--mono); font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .airport-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .airport-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; display: block; color: var(--text); transition: border-color 0.15s; }
    .airport-card:hover { border-color: var(--cyan); color: var(--text); }
    .card-iata { font-family: var(--mono); font-weight: 700; font-size: 1.5rem; color: var(--cyan); margin-bottom: 0.3rem; }
    .card-name { font-size: 0.9rem; font-weight: 600; line-height: 1.3; }
    .card-icao { font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); margin-top: 0.3rem; }
    footer { border-top: 1px solid var(--border); padding: 1.5rem; text-align: center; font-size: 0.78rem; color: var(--text-dim); }
    @media (max-width: 640px) { .nav { display: none; } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">✈ IATA<span>Codes</span></a>
      <nav class="nav">
        <a href="/">Search</a>
        <a href="/iata-to-icao/">IATA→ICAO</a>
        <a href="/icao-to-iata/">ICAO→IATA</a>
      </nav>
    </div>
  </header>
  <div class="breadcrumb">
    <a href="/">Home</a><span class="bc-sep">/</span>
    <a href="/country/{{COUNTRY_SLUG}}">{{COUNTRY}}</a><span class="bc-sep">/</span>
    <span>{{CITY}}</span>
  </div>
  <main>
    <div class="hero">
      <div class="hero-sub">City Airport Index</div>
      <h1>Airports in {{CITY}}, {{COUNTRY}}</h1>
    </div>

    <div class="ad-slot"><!-- ADSENSE_TOP_BANNER --></div>

    <section>
      <h2>Airports ({{COUNT}})</h2>
      <div class="airport-cards">
        {{AIRPORT_CARDS}}
      </div>
    </section>

    <div class="ad-slot"><!-- ADSENSE_BOTTOM_BANNER --></div>

    <p style="font-size:0.82rem; color: var(--text-dim); margin-top: 1rem;">
      → <a href="/country/{{COUNTRY_SLUG}}">View all airports in {{COUNTRY}}</a>
    </p>
  </main>
  <footer>
    Data from <a href="https://openflights.org/data">OpenFlights</a> ·
    <a href="/">IATA Code Lookup</a>
  </footer>
</body>
</html>
